apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-backend-secret
  labels:
    app: {{ .Release.Name }}
    component: backend
    environment: {{ .Values.global.environment }}
    managed-by: helm
type: Opaque
# stringData acepta texto plano — Kubernetes lo codifica en base64 internamente.
# Esto evita doble-encoding y hace los values.yaml legibles.
stringData:
  DB_USER: {{ .Values.auth.dbUser | quote }}
  DB_PASSWORD: {{ .Values.auth.dbPassword | quote }}
