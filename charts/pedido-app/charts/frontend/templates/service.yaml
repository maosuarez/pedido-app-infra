apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app: {{ .Release.Name }}
    component: frontend
    environment: {{ .Values.global.environment }}
    managed-by: helm
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}
    component: frontend
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
