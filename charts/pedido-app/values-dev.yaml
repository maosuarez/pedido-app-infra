# values-dev.yaml — overrides para el ambiente dev
# Aplica sobre values.yaml. Réplicas bajas, tags de desarrollo, PVC pequeño.

global:
  environment: dev

backend:
  image:
    tag: "1.0.0-dev"
  replicaCount: 1
  hpa:
    minReplicas: 1
    maxReplicas: 2
  auth:
    # Texto plano: el template usa stringData, Kubernetes hace el encoding a base64
    dbPassword: "pedidos_dev_pass"

frontend:
  image:
    tag: "1.0.0-dev"
  replicaCount: 1

db:
  postgresql:
    auth:
      # Debe coincidir con backend.auth.dbPassword para que el backend se conecte
      password: "pedidos_dev_pass"
    primary:
      persistence:
        size: 1Gi

ingress:
  host: pedido-app.dev.local
