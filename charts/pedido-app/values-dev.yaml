# values-dev.yaml — overrides para el ambiente dev
# Aplica sobre values.yaml. Réplicas bajas, tags de desarrollo, PVC pequeño.

global:
  environment: dev

backend:
  image:
    tag: "1.0.0-dev"
  replicaCount: 1
  hpa:
    minReplicas: 1
    maxReplicas: 2
  auth:
    dbPassword: "cGVkaWRvc19kZXZfcGFzcw=="  # base64: pedidos_dev_pass

frontend:
  image:
    tag: "1.0.0-dev"
  replicaCount: 1

db:
  auth:
    password: "cGVkaWRvc19kZXZfcGFzcw=="  # base64: pedidos_dev_pass — mismo que backend.auth.dbPassword
  primary:
    persistence:
      size: 1Gi

ingress:
  host: pedido-app.dev.local
