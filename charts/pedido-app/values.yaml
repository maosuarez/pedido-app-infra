# values.yaml — pedido-app chart raíz
# Todos los parámetros configurables con valores por defecto.
# Usar values-dev.yaml / values-prod.yaml para overrides por ambiente.

# ---------------------------------------------------------------------------
# Backend
# ---------------------------------------------------------------------------
backend:
  image:
    repository: maosuarez/pedido-backend
    # Tag sigue esquema Major.Minor.Fix (prod) o Major.Minor.Fix-dev (dev)
    tag: "1.0.0-dev"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  # Variables de entorno inyectadas via ConfigMap
  config:
    dbHost: "pedido-app-db-postgresql"
    dbPort: "5432"
    dbName: "pedidos"
    serverPort: "8080"
  # Credenciales inyectadas via Secret (valores base64 en el template)
  auth:
    dbUser: "pedidos_user"
    dbPassword: ""  # Siempre override en valores por ambiente — nunca texto plano en prod

# ---------------------------------------------------------------------------
# Frontend
# ---------------------------------------------------------------------------
frontend:
  image:
    repository: maosuarez/pedido-frontend
    tag: "1.0.0-dev"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ---------------------------------------------------------------------------
# Base de datos (PostgreSQL via subchart db / Bitnami)
# ---------------------------------------------------------------------------
db:
  auth:
    database: pedidos
    username: pedidos_user
    password: ""  # Override obligatorio — ver nota de credenciales en CLAUDE.md
  primary:
    persistence:
      enabled: true
      size: 1Gi
      storageClass: ""  # Usar StorageClass por defecto del cluster

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  host: pedido-app.local
  tls:
    enabled: false
    secretName: pedido-app-tls
  annotations: {}

# ---------------------------------------------------------------------------
# Labels globales aplicadas a todos los recursos
# ---------------------------------------------------------------------------
global:
  environment: dev
  labels:
    managed-by: helm
