# values.yaml — pedido-app chart raíz
# Todos los parámetros configurables con valores por defecto.
# Usar values-dev.yaml / values-prod.yaml para overrides por ambiente.

# ---------------------------------------------------------------------------
# Backend
# ---------------------------------------------------------------------------
backend:
  image:
    repository: maosuarez/pedido-backend
    # Tag sigue esquema Major.Minor.Fix (prod) o Major.Minor.Fix-dev (dev)
    tag: "1.0.0-dev"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  # Variables de entorno inyectadas via ConfigMap
  config:
    # El Service de Bitnami postgresql toma el nombre: <release>-postgresql
    # Con release "pedido-app" → "pedido-app-postgresql"
    dbHost: "pedido-app-postgresql"
    dbPort: "5432"
    dbName: "pedidos"
    serverPort: "8080"
  # Credenciales inyectadas via Secret con stringData (texto plano → Kubernetes codifica)
  auth:
    dbUser: "pedidos_user"
    dbPassword: ""  # Override en values-dev/prod — nunca dejar vacío en producción

# ---------------------------------------------------------------------------
# Frontend
# ---------------------------------------------------------------------------
frontend:
  image:
    repository: maosuarez/pedido-frontend
    tag: "1.0.0-dev"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ---------------------------------------------------------------------------
# Base de datos (PostgreSQL via subchart db / Bitnami)
# ---------------------------------------------------------------------------
# La clave "postgresql" es obligatoria: es el nombre de la dependencia en db/Chart.yaml.
# Helm pasa estos valores al chart de Bitnami usando esa clave como prefijo.
db:
  postgresql:
    auth:
      database: pedidos
      username: pedidos_user
      password: ""  # Override obligatorio en values-dev/prod
    primary:
      persistence:
        enabled: true
        size: 1Gi
        storageClass: ""  # Usa StorageClass por defecto del cluster

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  host: pedido-app.local
  tls:
    enabled: false
    secretName: pedido-app-tls
  annotations: {}

# ---------------------------------------------------------------------------
# Labels globales aplicadas a todos los recursos
# ---------------------------------------------------------------------------
global:
  environment: dev
  labels:
    managed-by: helm
