{{- if .Values.ingress.enabled }}
# Ingress: enruta el tráfico externo hacia los servicios internos del cluster.
# El controlador ingress-nginx lee este objeto y configura nginx automáticamente.
#
# Rutas:
#   /api/*  → pedido-app-backend:8080  (Spring Boot API)
#   /       → pedido-app-frontend:80   (React SPA via nginx)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    app: {{ .Release.Name }}
    component: ingress
    environment: {{ .Values.global.environment }}
    managed-by: helm
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Backend: /api/* llega tal cual al Spring Boot
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
          # Frontend: todo lo demas lo sirve la SPA (React + nginx)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
