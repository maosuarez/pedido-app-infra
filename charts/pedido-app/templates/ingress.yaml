{{- if .Values.ingress.enabled }}
# Ingress: enruta el tráfico externo hacia los servicios internos del cluster.
# El controlador ingress-nginx lee este objeto y configura nginx automáticamente.
#
# Rutas activas:
#   /api/pedidos  → pedido-app-backend:8080  (el backend ya define /api/* en sus rutas)
#
# Ruta pendiente (frontend no implementado aún):
#   /             → pedido-app-frontend:80
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    app: {{ .Release.Name }}
    component: ingress
    environment: {{ .Values.global.environment }}
    managed-by: helm
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Sin rewrite: el backend recibe la URL tal cual (/api/pedidos llega como /api/pedidos)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
