# values-prod.yaml — overrides para el ambiente prod
# IMPORTANTE: las contraseñas están en texto plano solo para pruebas académicas.
# En producción real usar helm-secrets o External Secrets Operator.

global:
  environment: prod

backend:
  image:
    tag: "2.0.3"
  replicaCount: 2
  hpa:
    minReplicas: 2
    maxReplicas: 5
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  auth:
    dbPassword: "pedidos_prod_pass"

frontend:
  image:
    tag: "2.0.3"
  replicaCount: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

db:
  postgresql:
    auth:
      password: "pedidos_prod_pass"
    primary:
      persistence:
        size: 10Gi
        storageClass: "managed-csi"  # StorageClass de AKS para discos persistentes

ingress:
  host: pedido-app.prod.local
  tls:
    enabled: false     # Sin TLS para pruebas locales (no hay cert disponible)
