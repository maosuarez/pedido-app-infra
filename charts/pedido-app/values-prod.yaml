# values-prod.yaml — overrides para el ambiente prod
# IMPORTANTE: las contraseñas se pasan como texto plano — el template usa stringData.
# En prod real usar helm-secrets o External Secrets Operator en lugar de este archivo.

global:
  environment: prod

backend:
  image:
    tag: "1.0.0"
  replicaCount: 2
  hpa:
    minReplicas: 2
    maxReplicas: 5
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  auth:
    dbPassword: ""  # REQUERIDO: proveer en despliegue prod

frontend:
  image:
    tag: "1.0.0"
  replicaCount: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

db:
  postgresql:
    auth:
      password: ""  # REQUERIDO: proveer en despliegue prod
    primary:
      persistence:
        size: 10Gi
        storageClass: "managed-csi"  # StorageClass de AKS para discos persistentes

ingress:
  host: pedido-app.example.com
  tls:
    enabled: true
    secretName: pedido-app-tls-prod
